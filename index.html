    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary-color: #8b5cf6;
            --primary-hover: #7c3aed;
            --secondary-color: #06b6d4;
            --card-bg: #1e293b;
            --border-color: #334155;
        }
    }

    @layer base {
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
        }
    }

    @layer components {
        .btn {
            @apply px-6 py-3 rounded-full font-medium transition-all duration-300 flex items-center gap-2 cursor-pointer;
        }
        .btn-primary {
            @apply bg-[var(--primary-color)] text-white hover:bg-[var(--primary-hover)] shadow-lg shadow-violet-500/20 hover:shadow-violet-500/40;
        }
        .btn-secondary {
            @apply bg-transparent border border-[var(--border-color)] text-white hover:border-[var(--secondary-color)] hover:text-[var(--secondary-color)];
        }
        .section-padding {
            @apply py-20 px-6 md:px-12 lg:px-20;
        }
        .glass-card {
            @apply bg-[var(--card-bg)] bg-opacity-60 backdrop-blur-lg border border-[var(--border-color)] rounded-2xl;
        }
    }

    @layer utilities {
        .text-gradient {
            @apply bg-clip-text text-transparent bg-gradient-to-r from-[var(--secondary-color)] to-[var(--primary-color)];
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    }
    </style>
