    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --bg-dark: #09090b;
            --bg-card: #18181b;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
        }
    }

    @layer base {
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
        }
    }

    @layer components {
        .glass-panel {
            @apply bg-white/5 backdrop-blur-lg border border-white/10;
        }
        .btn-primary {
            @apply px-6 py-3 rounded-full bg-[var(--primary)] text-white font-medium transition-all hover:bg-[var(--primary-hover)] hover:shadow-[0_0_20px_rgba(139,92,246,0.5)] active:scale-95;
        }
        .btn-outline {
            @apply px-6 py-3 rounded-full border border-white/20 text-white font-medium transition-all hover:bg-white/10 active:scale-95;
        }
        .icon-btn {
            @apply p-2 rounded-full hover:bg-white/10 transition-colors text-white/80 hover:text-white;
        }
    }

    @layer utilities {
        .text-gradient {
            @apply bg-clip-text text-transparent bg-gradient-to-r from-[var(--primary)] via-[var(--secondary)] to-[var(--accent)];
        }
    }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/Hero.js"></script>
    <script type="text/babel" src="components/SongCard.js"></script>
    <script type="text/babel" src="components/FeaturedTracks.js"></script>
    <script type="text/babel" src="components/About.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
