    <script>
        const { useState, useEffect, useRef } = React;
        
        // ==================== AI MUSIC SYNTHESIZER ENGINE ====================
        class SonicAISynth {
            constructor() {
                this.audioCtx = null;
                this.isPlaying = false;
                this.activeNodes = [];
                this.gainNode = null;
                this.currentTimeout = null;
            }
            
            initAudio() {
                if (this.audioCtx) return;
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.gainNode = this.audioCtx.createGain();
                this.gainNode.gain.value = 0.3;
                this.gainNode.connect(this.audioCtx.destination);
            }
            
            // AI Melody Generation based on prompt and genre
            generateMelody(textPrompt, genre) {
                // Create hash from text prompt for unique variations
                let hash = 0;
                for (let i = 0; i < textPrompt.length; i++) {
                    hash = ((hash << 5) - hash) + textPrompt.charCodeAt(i);
                    hash |= 0;
                }
                const seed = Math.abs(hash % 100) / 100;
                
                // Genre-specific scales
                const scales = {
                    'Electronic': [329.63, 369.99, 415.30, 440.00, 493.88, 523.25, 587.33],
                    'Lo-fi': [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 523.25],
                    'Ambient': [220.00, 261.63, 293.66, 329.63, 349.23, 392.00, 440.00],
                    'Pop': [261.63, 293.66, 329.63, 392.00, 440.00, 493.88, 523.25],
                    'Rock': [293.66, 329.63, 369.99, 392.00, 440.00, 493.88, 523.25],
                    'Cinematic': [174.61, 207.65, 233.08, 261.63, 311.13, 349.23, 392.00]
                };
                
                let scale = scales[genre] || scales.Electronic;
                // Add seed-based variation
                scale = scale.map(f => f * (0.98 + (seed * 0.04)));
                
                const patternLength = 32;
                let melody = [];
                let lastNote = Math.floor(seed * scale.length);
                
                for (let i = 0; i < patternLength; i++) {
                    let noteIndex;
                    const rand = (Math.random() + seed) % 1;
                    if (rand > 0.65 && lastNote !== -1) {
                        noteIndex = lastNote;
                    } else {
                        noteIndex = Math.floor(rand * scale.length);
                    }
                    lastNote = noteIndex;
                    const duration = rand > 0.7 ? 0.5 : 0.25;
                    melody.push({
                        freq: scale[noteIndex],
                        duration: duration,
                        startOffset: i * 0.25,
                        velocity: 0.2 + (rand * 0.15)
                    });
                }
                return { melody };
            }
            
            async playSong(textPrompt, genre, onEndCallback) {
                if (!this.audioCtx) this.initAudio();
                if (this.audioCtx.state === 'suspended') {
                    await this.audioCtx.resume();
                }
                if (this.isPlaying) this.stopCurrent();
                
                const tempo = genre === 'Lo-fi' ? 85 : (genre === 'Ambient' ? 70 : 110);
                const { melody } = this.generateMelody(textPrompt, genre);
                const secondsPerBeat = 60 / tempo;
                const currentTime = this.audioCtx.currentTime;
                this.isPlaying = true;
                
                let endTime = 0;
                
                // Lead Melody
                melody.forEach(note => {
                    const start = currentTime + (note.startOffset * secondsPerBeat);
                    const durationSec = note.duration * secondsPerBeat;
                    const end = start + durationSec;
                    if (end > endTime) endTime = end;
                    
                    const osc = this.audioCtx.createOscillator();
                    const noteGain = this.audioCtx.createGain();
                    
                    if (genre === 'Lo-fi') osc.type = 'sine';
                    else if (genre === 'Electronic') osc.type = 'sawtooth';
                    else if (genre === 'Ambient') osc.type = 'sine';
                    else osc.type = 'triangle';
                    
                    osc.frequency.value = note.freq;
                    noteGain.gain.setValueAtTime(note.velocity, start);
                    noteGain.gain.exponentialRampToValueAtTime(0.0001, end);
                    osc.connect(noteGain);
                    noteGain.connect(this.gainNode);
                    osc.start(start);
                    osc.stop(end);
                    this.activeNodes.push(osc, noteGain);
                });
                
                // Bassline
                const bassOsc = this.audioCtx.createOscillator();
                const bassGain = this.audioCtx.createGain();
                bassOsc.type = 'triangle';
                bassOsc.frequency.value = 65.41;
                bassGain.gain.value = 0.12;
                bassOsc.connect(bassGain);
                bassGain.connect(this.gainNode);
                bassOsc.start(currentTime);
                bassOsc.stop(endTime + 0.5);
                this.activeNodes.push(bassOsc, bassGain);
                
                // Pad/Chords
                const padOsc = this.audioCtx.createOscillator();
                const padGain = this.audioCtx.createGain();
                padOsc.type = 'sine';
                padOsc.frequency.value = 130.81;
                padGain.gain.value = 0.06;
                padOsc.connect(padGain);
                padGain.connect(this.gainNode);
                padOsc.start(currentTime);
                padOsc.stop(endTime + 0.3);
                this.activeNodes.push(padOsc, padGain);
                
                const timeoutDuration = (endTime - currentTime) * 1000 + 500;
                this.currentTimeout = setTimeout(() => {
                    if (this.isPlaying) {
                        this.isPlaying = false;
                        if (onEndCallback) onEndCallback();
                    }
                }, Math.max(800, timeoutDuration));
            }
            
            stopCurrent() {
                if (this.currentTimeout) clearTimeout(this.currentTimeout);
                if (this.activeNodes) {
                    this.activeNodes.forEach(node => {
                        try { node.stop && node.stop(); node.disconnect(); } catch(e) {}
                    });
                    this.activeNodes = [];
                }
                this.isPlaying = false;
            }
        }
        
        const synth = new SonicAISynth();
        
        // ==================== AI LYRIC GENERATOR ====================
        const generateAILyrics = (prompt, genre) => {
            const lyricTemplates = {
                'Electronic': ['pulse', 'light', 'energy', 'digital', 'vibrate', 'neon', 'rhythm', 'electric'],
                'Lo-fi': ['rain', 'midnight', 'coffee', 'dreams', 'quiet', 'slow', 'vibes', 'calm'],
                'Ambient': ['space', 'silence', 'floating', 'eternal', 'calm', 'horizon', 'peace', 'zen'],
                'Pop': ['heart', 'shine', 'tonight', 'dance', 'love', 'stars', 'forever', 'magic'],
                'Rock': ['fire', 'rebel', 'thunder', 'wild', 'storm', 'rage', 'freedom', 'power'],
                'Cinematic': ['epic', 'journey', 'destiny', 'brave', 'storm', 'rise', 'glory', 'legend']
            };
            
            const words = lyricTemplates[genre] || lyricTemplates['Electronic'];
            const topic = prompt.trim() || "music";
            
            return `🎤 VERSE 1:\nIn the ${words[0]} of ${topic},\nWhere ${words[1]} meets the sound,\nA ${words[2]} echoes through the air,\nA rhythm that we've found.\n\n🎶 CHORUS:\nSonicAI, take me higher,\n${words[3]} like digital fire,\n${words[4]} flows through the wire,\nThis ${words[5]} takes us higher!\n\n🎤 VERSE 2:\nThrough the ${words[6]} we navigate,\nWhere dreams and ${words[7]} create,\nA melody that never fades,\nIn this ${genre.toLowerCase()} serenade.\n\n✨ BRIDGE:\nArtificial intelligence,\nCreating sonic excellence,\nEvery note, a new existence,\nMusic born from code and persistence.\n\n🎶 CHORUS:\nSonicAI, take me higher,\n${words[3]} like digital fire,\n${words[4]} flows through the wire,\nThis ${words[5]} takes us higher!`;
        };

                    <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-gradient-to-r from-purple-500/10 to-cyan-500/10 rounded-full blur-3xl"></div>
                    
                    <div className="max-w-6xl mx-auto px-6 text-center relative z-10">

                        <p className="text-xl text-gray-300 max-w-2xl mx-auto mb-10">

                        </p>
                        <div className="flex flex-wrap gap-4 justify-center">

        const MusicGenerator = () => {
            const [prompt, setPrompt] = useState("dreamy night sky with shooting stars");
            const [genre, setGenre] = useState("Electronic");
            const [isGenerating, setIsGenerating] = useState(false);
            const [generatedSong, setGeneratedSong] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [lyrics, setLyrics] = useState("");
            const [activeTab, setActiveTab] = useState("lyrics");
            
            const genres = ["Electronic", "Lo-fi", "Ambient", "Pop", "Rock", "Cinematic"];
            
            const handleGenerate = async () => {
                if (!prompt.trim()) {
                    alert("Please enter a creative prompt!");
                    return;
                }
                setIsGenerating(true);
                await new Promise(r => setTimeout(r, 800));
                
                const newLyrics = generateAILyrics(prompt, genre);
                setLyrics(newLyrics);
                setGeneratedSong({
                    prompt: prompt,
                    genre: genre,
                    timestamp: new Date().toLocaleTimeString(),
                    title: prompt.slice(0, 35) + (prompt.length > 35 ? "..." : "")
                });
                
                if (isPlaying) {
                    synth.stopCurrent();
                    setIsPlaying(false);
                }
                setIsGenerating(false);
            };
            
            const handlePlayPause = async () => {
                if (!generatedSong) {
                    alert("Generate a song first!");
                    return;
                }
                try {
                    if (isPlaying) {
                        synth.stopCurrent();
                        setIsPlaying(false);
                    } else {
                        await synth.playSong(generatedSong.prompt, generatedSong.genre, () => {
                            setIsPlaying(false);
                        });
                        setIsPlaying(true);
                    }
                } catch (err) {
                    alert("Click again to enable audio playback");
                }
            };
            
            const handleStop = () => {
                synth.stopCurrent();
                setIsPlaying(false);
            };
            
            useEffect(() => {
                return () => synth.stopCurrent();
